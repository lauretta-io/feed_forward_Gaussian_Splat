# @package _global_

defaults:
  - override /dataset: re10k
  - override /dataset/view_sampler: evaluation
  - override /model/encoder: costvolume
  - override /model/decoder: mvsplat_splatting_cuda
  - override /loss: [mse, lpips]

wandb:
  name: mvsplat/dtu/views2
  tags: [mvsplat, dtu, 256x256]

data_loader:
  train:
    batch_size: 14

trainer:
  max_steps: 300_001
  num_nodes: 1

model:
  encoder:
    num_depth_candidates: 128
    costvolume_unet_feat_dim: 128
    costvolume_unet_channel_mult: [1, 1, 1]
    costvolume_unet_attn_res: [4]
    gaussians_per_pixel: 1
    depth_unet_feat_dim: 32
    depth_unet_attn_res: [16]
    depth_unet_channel_mult: [1, 1, 1, 1, 1]

loss:
  lpips:
    apply_after_step: 0
    weight: 0.05
    perceptual_loss: false

dataset:
  image_shape: [256, 256]
  roots: [datasets/dtu]
  near: 2.125
  far: 4.525
  baseline_scale_bounds: false
  make_baseline_1: false
  average_pose: false
  center_pose: false
  train_times_per_scene: 1
  highres: false
  scannet: false
  tartanair: false
  load_depth: false
  pose_align_first_view: false
  pose_align_middle_view: false
  scale_extrinsics: 1.
  load_remain_context: false
  skip_bad_shape: false
  view_sampler:
    index_path: assets/mvsplat/evaluation_index_dtu_nctx2.json

test:
  eval_time_skip_steps: 5
  compute_scores: true
